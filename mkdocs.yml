site_name: bytdb
site_description: An embedded, Postgres-wire-compatible relational database in pure Go
repo_url: https://github.com/rohanthewiz/bytdb
repo_name: rohanthewiz/bytdb

theme:
  name: material
  icon:
    logo: material/database
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Features & Examples: features.md
  - Considerations & Gotchas: gotchas.md
  - Testing: testing.md
  - Benchmarks: benchmarks.md
